name: Publish Pt.Okx.Sdk to NuGet

on:
  push:
    tags:
      - 'v*' # Trigger when a version tag (e.g., v0.9.0-beta.1) is pushed

permissions:
  id-token: write  # Required to request the OIDC token from GitHub
  contents: write  # Required to create a release and upload assets

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' # Use latest .NET SDK supporting multi-targeting

      - name: Restore Dependencies
        run: dotnet restore Pt.Okx.Sdk/Pt.Okx.Sdk.csproj

      - name: Build Project
        run: dotnet build Pt.Okx.Sdk/Pt.Okx.Sdk.csproj -c Release --no-restore

      # Pack to generate .nupkg file
      - name: Pack Package
        run: dotnet pack Pt.Okx.Sdk/Pt.Okx.Sdk.csproj -c Release --no-build -o ./dist

      # Log in to NuGet.org using OIDC and exchange for a short-lived key
      - name: NuGet Login
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: vntradesoft # Your NuGet.org Username or Organization

      # Push package to NuGet.org
      - name: Push to NuGet
        run: |
          dotnet nuget push ./dist/*.nupkg \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      # Create GitHub Release and upload package asset
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*.nupkg
          prerelease: true # Mark as pre-release since version is beta
          generate_release_notes: true

